name: Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'protocol/**'
      - 'migrations/**'
      - 'deploy/**'
      - 'Dockerfile'
      - 'docker-compose*.yml'
      - 'web/public/p/shell.html'
  workflow_dispatch:

env:
  REGISTRY: mehanig.azurecr.io
  IMAGE: mehanig.azurecr.io/yourbro

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Azure/docker-login@v1
        with:
          login-server: ${{ env.REGISTRY }}
          username: mehanig
          password: ${{ secrets.AZ_REGISTRY_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy deploy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "deploy/docker-compose.prod.yml,deploy/nginx.conf,deploy/setup.sh,deploy/deploy.sh"
          target: /tmp/yourbro-deploy
          strip_components: 1

      - name: Setup and deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: AZ_REGISTRY_PASSWORD
          script: |
            set -e

            # First-time setup: install Docker if missing
            if ! command -v docker &>/dev/null; then
              echo "==> Installing Docker"
              curl -fsSL https://get.docker.com | sh
            fi

            # Create deploy directory
            mkdir -p /opt/yourbro/nginx

            # Copy files from temp location
            cp /tmp/yourbro-deploy/docker-compose.prod.yml /opt/yourbro/docker-compose.yml
            cp /tmp/yourbro-deploy/nginx.conf /opt/yourbro/nginx/nginx.conf
            cp /tmp/yourbro-deploy/deploy.sh /opt/yourbro/deploy.sh
            chmod +x /opt/yourbro/deploy.sh
            rm -rf /tmp/yourbro-deploy

            # Login to Azure Container Registry
            echo "${{ secrets.AZ_REGISTRY_PASSWORD }}" | docker login mehanig.azurecr.io -u mehanig --password-stdin

            # Generate self-signed SSL cert if no cert exists (Cloudflare terminates public SSL)
            CERT_DIR="/opt/yourbro/ssl"
            if [ ! -f "$CERT_DIR/fullchain.pem" ]; then
              echo "==> Generating self-signed SSL certificate for Cloudflare origin"
              mkdir -p "$CERT_DIR"
              openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
                -keyout "$CERT_DIR/privkey.pem" \
                -out "$CERT_DIR/fullchain.pem" \
                -subj "/CN=yourbro.ai"
            fi

            # Generate .env if first deploy
            if [ ! -f /opt/yourbro/.env ]; then
              echo "==> Generating .env with random secrets"
              JWT_SECRET=$(openssl rand -hex 32)
              INTERNAL_KEY=$(openssl rand -hex 32)
              POSTGRES_PASS=$(openssl rand -hex 16)
              cat > /opt/yourbro/.env <<EOF
            DATABASE_URL=postgres://yourbro:${POSTGRES_PASS}@postgres:5432/yourbro?sslmode=disable
            POSTGRES_PASSWORD=${POSTGRES_PASS}
            JWT_SECRET=${JWT_SECRET}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_REDIRECT_URL=https://api.yourbro.ai/auth/google/callback
            FRONTEND_URL=https://yourbro.ai
            COOKIE_DOMAIN=yourbro.ai
            YOURBRO_INTERNAL_KEY=${INTERNAL_KEY}
            DOMAIN=yourbro.ai
            EOF
            fi

            # Ensure critical env vars are present and non-empty
            ENV_FILE="/opt/yourbro/.env"
            ensure_env() {
              local key="$1" val="$2"
              if ! grep -qE "^${key}=.+" "$ENV_FILE"; then
                sed -i "/^${key}=/d" "$ENV_FILE"
                echo "${key}=${val}" >> "$ENV_FILE"
              fi
            }
            ensure_env GOOGLE_CLIENT_ID '${{ secrets.GOOGLE_CLIENT_ID }}'
            ensure_env GOOGLE_CLIENT_SECRET '${{ secrets.GOOGLE_CLIENT_SECRET }}'
            ensure_env FRONTEND_URL 'https://yourbro.ai'
            ensure_env DOMAIN 'yourbro.ai'
            ensure_env COOKIE_DOMAIN 'yourbro.ai'
            ensure_env CF_ZONE_ID '${{ secrets.CLOUDFLARE_ZONE_ID }}'
            ensure_env CF_API_TOKEN '${{ secrets.CLOUDFLARE_API_TOKEN }}'

            # Update redirect URL for API subdomain (ensure_env won't update existing values)
            sed -i "s|GOOGLE_REDIRECT_URL=.*|GOOGLE_REDIRECT_URL=https://api.yourbro.ai/auth/google/callback|" "$ENV_FILE"

            # Deploy
            cd /opt/yourbro
            docker compose pull
            docker compose up -d
            docker compose restart nginx
            sleep 3
            docker compose exec -T api ./server migrate
            docker image prune -f
            echo "==> Deploy complete"
            docker compose ps

            # Verify deployment
            sleep 5
            if curl -sf https://api.yourbro.ai/health > /dev/null; then
              echo "==> Health check passed"
            else
              echo "==> WARNING: Health check failed"
              docker compose logs --tail=20
            fi
