    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
            background: #0d1117;
            color: #e6edf3;

        .yb-sr-only {
            position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;

        }
        :focus-visible { outline: 2px solid #58a6ff; outline-offset: 2px; }
        input:focus-visible { outline-offset: -1px; }
        a[href]:not(.yb-cta):not(.yb-skip-link) {
            text-decoration: none;
            background-image: linear-gradient(#58a6ff, #58a6ff);
            background-size: 0% 1px;
            background-position: 0 100%;
            background-repeat: no-repeat;
            transition: background-size 0.25s ease;
        }
        a[href]:not(.yb-cta):not(.yb-skip-link):hover {
            background-size: 100% 1px;
        }
        .yb-cta {
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .yb-cta:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(230, 237, 243, 0.12);
        }
        .yb-cta:active {
            transform: translateY(1px);
            box-shadow: none;
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
        @media (max-width: 700px) {
            .yb-btn-danger, .yb-btn-secondary {
                min-height: 36px;
                padding: 0.4rem 0.85rem;
            }
