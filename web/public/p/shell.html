<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yourbro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #fafafa; }
        .frame-container { width: 100%; height: 100vh; }
        iframe { width: 100%; height: 100%; border: none; }
        .status-msg {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; font-size: 18px; color: #888;
            text-align: center; padding: 20px;
        }
        .status-msg a { color: #3b82f6; margin-top: 8px; }
        .status-msg .subtitle { font-size: 14px; color: #555; margin-top: 6px; }
    </style>
</head>
<body>
    <script>
        (async function() {
            var API = 'https://api.yourbro.ai';

            // Parse username and slug from /p/{username}/{slug}
            var parts = window.location.pathname.split('/').filter(Boolean);
            if (parts.length < 3 || parts[0] !== 'p') {
                document.body.innerHTML = '<div class="status-msg">Invalid page URL.</div>';
                return;
            }

            // Guard: if path is /p/assets/..., the SW didn't intercept the iframe request
            // and Cloudflare rewrote it back to shell.html. Don't re-run — show nothing.
            if (parts[1] === 'assets') return;

            var username = decodeURIComponent(parts[1]);
            var slug = decodeURIComponent(parts[2]);

            document.title = slug + ' \u2014 yourbro';

            // Register Service Worker for asset serving and await control
            var swReady = null;
            var swControlling = false;
            if ('serviceWorker' in navigator) {
                try {
                    var swReg = await navigator.serviceWorker.register('/p/page-sw.js', { scope: '/p/' });
                    swReady = navigator.serviceWorker.ready;
                    // Await activation for first-time visitors
                    var reg = await swReady;
                    if (!reg.active) {
                        await new Promise(function(resolve) {
                            var sw = reg.installing || reg.waiting;
                            if (!sw) { resolve(); return; }
                            sw.addEventListener('statechange', function() {
                                if (reg.active) resolve();
                            });
                        });
                    }
                    // Wait for SW to actually control this page (clients.claim())
                    if (navigator.serviceWorker.controller) {
                        swControlling = true;
                    } else {
                        await new Promise(function(resolve) {
                            var timeout = setTimeout(function() { resolve(); }, 3000);
                            navigator.serviceWorker.addEventListener('controllerchange', function() {
                                clearTimeout(timeout);
                                swControlling = true;
                                resolve();
                            });
                        });
                    }
                } catch(e) {
                    console.warn('SW registration failed:', e);
                }
            }
            var _dbg = 'SW: ready=' + !!swReady + ' ctrl=' + swControlling + '\n';

            // MIME type lookup (matches page-sw.js)
            var MIMES = {
                'html':'text/html;charset=utf-8','js':'application/javascript;charset=utf-8',
                'mjs':'application/javascript;charset=utf-8','css':'text/css;charset=utf-8',
                'json':'application/json;charset=utf-8','svg':'image/svg+xml',
                'png':'image/png','jpg':'image/jpeg','jpeg':'image/jpeg','gif':'image/gif',
                'webp':'image/webp','ico':'image/x-icon','woff':'font/woff','woff2':'font/woff2',
                'ttf':'font/ttf','otf':'font/otf','mp3':'audio/mpeg','mp4':'video/mp4',
                'webm':'video/webm','pdf':'application/pdf','txt':'text/plain;charset=utf-8',
                'xml':'text/xml;charset=utf-8'
            };
            function fileMime(name) {
                var d = name.lastIndexOf('.');
                return d === -1 ? 'application/octet-stream' : (MIMES[name.substring(d+1).toLowerCase()] || 'application/octet-stream');
            }

            // Shared rendering: cache files in SW and create iframe
            async function renderPage(pageData) {
                var pageTitle = pageData.title || slug;
                document.title = pageTitle + ' \u2014 yourbro';

                var swCached = false;

                // Send file bundle to Service Worker for caching
                if (swReady && swControlling) {
                    try {
                        var reg = await swReady;
                        var sw = reg.active;
                        if (sw) {
                            await new Promise(function(resolve) {
                                var channel = new MessageChannel();
                                channel.port1.onmessage = function() { resolve(); };
                                sw.postMessage({
                                    type: 'cache-page',
                                    slug: slug,
                                    files: pageData.files
                                }, [channel.port2]);
                            });
                            swCached = true;
                        }
                    } catch(e) {
                        console.warn('SW caching failed:', e);
                    }
                }

                var container = document.createElement('div');
                container.className = 'frame-container';
                var iframe = document.createElement('iframe');

                if (swCached) {
                    // SW path — serves files from cache
                    iframe.src = '/p/assets/' + slug + '/index.html';
                    iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin');
                    _dbg += 'path=SW\n';
                } else {
                  try {
                    _dbg += 'path=BLOB files=' + Object.keys(pageData.files).length + '\n';
                    // No-SW fallback: blob URLs + fetch/XHR override
                    var files = pageData.files;
                    var blobMap = {};

                    // Pass 1: create blob URLs for binary files
                    for (var name in files) {
                        if (name === 'index.html') continue;
                        var content = files[name];
                        if (typeof content === 'string' && content.substring(0, 7) === 'base64:') {
                            var bin = atob(content.substring(7));
                            var bytes = new Uint8Array(bin.length);
                            for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
                            blobMap[name] = URL.createObjectURL(new Blob([bytes], { type: fileMime(name) }));
                        }
                    }

                    // Pass 2: text files — rewrite refs to binary assets, then create blobs
                    for (var name in files) {
                        if (name === 'index.html') continue;
                        var content = files[name];
                        if (typeof content !== 'string' || content.substring(0, 7) === 'base64:') continue;
                        var text = content;
                        for (var ref in blobMap) {
                            text = text.split('./' + ref).join(blobMap[ref]);
                            text = text.split(ref).join(blobMap[ref]);
                        }
                        blobMap[name] = URL.createObjectURL(new Blob([text], { type: fileMime(name) }));
                    }

                    // Rewrite index.html — replace file refs with blob URLs
                    var html = files['index.html'];
                    for (var name in blobMap) {
                        html = html.split('./' + name).join(blobMap[name]);
                        html = html.split(name).join(blobMap[name]);
                    }

                    // Inject fetch/XHR override for dynamic requests from page JS
                    var mapJson = JSON.stringify(blobMap);
                    var override = '<script>(function(){var m=' + mapJson + ';' +
                        'var F=window.fetch;window.fetch=function(u,o){' +
                        'var k=typeof u==="string"?u:u.url;k=k.replace(/^\\.\\//,"");' +
                        'if(m[k])return F(m[k],o);return F.apply(this,arguments)};' +
                        'var X=XMLHttpRequest.prototype.open;' +
                        'XMLHttpRequest.prototype.open=function(){' +
                        'var u=arguments[1];if(typeof u==="string"){var k=u.replace(/^\\.\\//,"");if(m[k])arguments[1]=m[k]}' +
                        'return X.apply(this,arguments)}' +
                        '})()<\/script>';

                    var headIdx = html.toLowerCase().indexOf('<head>');
                    if (headIdx !== -1) {
                        html = html.substring(0, headIdx + 6) + override + html.substring(headIdx + 6);
                    } else {
                        html = override + html;
                    }

                    var blobUrl = URL.createObjectURL(new Blob([html], { type: 'text/html' }));
                    _dbg += 'blobs=' + Object.keys(blobMap).join(',') + '\n';
                    _dbg += 'html=' + html.length + 'b\n';
                    _dbg += html.substring(0, 200) + '\n';
                    iframe.src = blobUrl;
                    iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin');
                  } catch(e) {
                    _dbg += 'BLOB ERROR: ' + e.message + '\n';
                  }
                }

                // Debug overlay (temporary)
                var dbgEl = document.createElement('pre');
                dbgEl.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#000;color:#0f0;font-size:11px;padding:8px;max-height:40vh;overflow:auto;white-space:pre-wrap;word-break:break-all';
                dbgEl.textContent = _dbg;
                document.body.appendChild(dbgEl);

                container.appendChild(iframe);
                document.body.appendChild(container);

                return iframe;
            }

            // ==========================================
            // 1. Always try public endpoint first (fast, one GET)
            // ==========================================
            var pageData = null;
            var isPublic = false;
            var debugInfo = '';

            try {
                var publicUrl = API + '/api/public-page/' +
                    encodeURIComponent(username) + '/' + encodeURIComponent(slug);
                debugInfo += 'fetch: ' + publicUrl + '\n';
                var publicResp = await fetch(publicUrl);
                debugInfo += 'status: ' + publicResp.status + '\n';
                if (publicResp.ok) {
                    pageData = await publicResp.json();
                    isPublic = true;
                }
            } catch(e) {
                debugInfo += 'error: ' + e.message + '\n';
                console.error('Public page fetch failed:', e);
            }

            // If public worked, render and exit
            if (isPublic && pageData && pageData.files && pageData.files['index.html']) {
                var iframe = await renderPage(pageData);

                // Storage bridge: respond with error for public pages (no E2E keys)
                window.addEventListener('message', function(event) {
                    if (!event.data || event.data.type !== 'yourbro-storage') return;
                    if (event.source !== iframe.contentWindow) return;
                    iframe.contentWindow.postMessage({
                        type: 'yourbro-storage-response',
                        action: event.data.action,
                        requestId: event.data.requestId,
                        ok: false,
                        error: 'Storage is not available for public pages'
                    }, '*');
                });

                return;
            }

            // ==========================================
            // 2. Not public — try E2E encrypted path (requires login)
            // ==========================================
            var hasSession = localStorage.getItem('yb_logged_in') === '1';
            if (!hasSession) {
                document.body.innerHTML = '<div class="status-msg">' +
                    'This page is not available.' +
                    '<div class="subtitle">It may be private or the author\'s agent may be offline.</div>' +
                    '<pre style="font-size:11px;color:#555;margin-top:12px;text-align:left;max-width:400px;word-break:break-all">' + debugInfo + 'ua: ' + navigator.userAgent.substring(0,80) + '</pre>' +
                    '<a href="/">Sign in</a></div>';
                return;
            }

            // 2a. Verify auth
            var authResp = await fetch(API + '/api/content-token', { credentials: 'include' });
            if (!authResp.ok) {
                document.body.innerHTML = '<div class="status-msg">Sign in to view this page. <a href="/">Go to login</a></div>';
                return;
            }

            // 2b. Get agent IDs from API
            var agentsResp = await fetch(API + '/api/page-agents/' + encodeURIComponent(username), { credentials: 'include' });
            if (!agentsResp.ok) {
                document.body.innerHTML = '<div class="status-msg">User not found. <a href="/">Go home</a></div>';
                return;
            }
            var agentIds = (await agentsResp.json()).agent_ids;
            if (!agentIds || agentIds.length === 0) {
                document.body.innerHTML = '<div class="status-msg">No agents registered. <a href="/">Go home</a></div>';
                return;
            }

            // 2c. Load E2E keys from IndexedDB (stored by dashboard pairing flow)
            var x25519Private = null; // CryptoKey
            var x25519PubBytes = null; // Uint8Array
            var agentX25519Keys = {};
            try {
                var db = await new Promise(function(res, rej) {
                    var req = indexedDB.open('clawd-keys', 3);
                    req.onupgradeneeded = function() {
                        var d = req.result;
                        for (var n of Array.from(d.objectStoreNames)) d.deleteObjectStore(n);
                        d.createObjectStore('x25519');
                        d.createObjectStore('agent-keys');
                    };
                    req.onsuccess = function() { res(req.result); };
                    req.onerror = function() { rej(req.error); };
                });
                var stored = await new Promise(function(res, rej) {
                    var tx = db.transaction('x25519', 'readonly');
                    var req = tx.objectStore('x25519').get('default');
                    req.onsuccess = function() { res(req.result || null); };
                    req.onerror = function() { rej(req.error); };
                });
                if (stored && stored.pk && stored.pub) {
                    x25519Private = await crypto.subtle.importKey('pkcs8', stored.pk.buffer, 'X25519', false, ['deriveBits']);
                    x25519PubBytes = stored.pub;
                }
                for (var i = 0; i < agentIds.length; i++) {
                    try {
                        var k = await new Promise(function(res, rej) {
                            var tx = db.transaction('agent-keys', 'readonly');
                            var req = tx.objectStore('agent-keys').get('x25519-' + agentIds[i]);
                            req.onsuccess = function() { res(req.result || null); };
                            req.onerror = function() { rej(req.error); };
                        });
                        if (k) agentX25519Keys[agentIds[i]] = k;
                    } catch(e) {}
                }
            } catch(e) { /* IndexedDB not available */ }

            // 2d. Derive E2E encryption key
            var e2eAgentId = null;
            var aesKey = null;
            if (x25519Private) {
                for (var i = 0; i < agentIds.length; i++) {
                    if (agentX25519Keys[agentIds[i]]) {
                        try {
                            var agentPub = await crypto.subtle.importKey(
                                'raw', agentX25519Keys[agentIds[i]], 'X25519', true, []
                            );
                            var shared = await crypto.subtle.deriveBits(
                                { name: 'X25519', public: agentPub }, x25519Private, 256
                            );
                            var hkdfKey = await crypto.subtle.importKey('raw', shared, 'HKDF', false, ['deriveKey']);
                            aesKey = await crypto.subtle.deriveKey(
                                { name: 'HKDF', hash: 'SHA-256', salt: new ArrayBuffer(0), info: new TextEncoder().encode('yourbro-e2e-v1') },
                                hkdfKey,
                                { name: 'AES-GCM', length: 256 },
                                false,
                                ['encrypt', 'decrypt']
                            );
                            e2eAgentId = agentIds[i];
                            break;
                        } catch(e) {
                            console.warn('E2E key derivation failed for agent', agentIds[i], e);
                        }
                    }
                }
            }

            if (!aesKey) {
                document.body.innerHTML = '<div class="status-msg">Encryption keys missing.<div class="subtitle">Re-pair your agent to enable E2E encryption.</div><a href="/#/dashboard">Go to dashboard</a></div>';
                return;
            }

            // User's X25519 public key as base64url
            var userKeyId = '';
            if (x25519PubBytes) {
                var s = '';
                for (var i = 0; i < x25519PubBytes.length; i++) s += String.fromCharCode(x25519PubBytes[i]);
                userKeyId = btoa(s).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
            }

            // E2E helpers
            function e2eEncrypt(plaintext) {
                var iv = crypto.getRandomValues(new Uint8Array(12));
                return crypto.subtle.encrypt({ name: 'AES-GCM', iv: iv }, aesKey, plaintext).then(function(ct) {
                    var result = new Uint8Array(12 + ct.byteLength);
                    result.set(iv);
                    result.set(new Uint8Array(ct), 12);
                    return result;
                });
            }
            function e2eDecrypt(data) {
                var iv = data.slice(0, 12);
                var ct = data.slice(12);
                return crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, aesKey, ct).then(function(pt) {
                    return new Uint8Array(pt);
                });
            }
            function toBase64(bytes) {
                var s = '';
                for (var i = 0; i < bytes.length; i++) s += String.fromCharCode(bytes[i]);
                return btoa(s);
            }
            function fromBase64(b64) {
                var s = atob(b64);
                var bytes = new Uint8Array(s.length);
                for (var i = 0; i < s.length; i++) bytes[i] = s.charCodeAt(i);
                return bytes;
            }

            // 2e. Fetch page bundle from agent via E2E encrypted relay
            var usedAgentId = e2eAgentId;
            try {
                var innerReq = JSON.stringify({
                    id: crypto.randomUUID(),
                    method: 'GET',
                    path: '/api/page/' + encodeURIComponent(slug)
                });
                var encrypted = await e2eEncrypt(new TextEncoder().encode(innerReq));
                var resp = await fetch(API + '/api/relay/' + e2eAgentId, {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id: crypto.randomUUID(),
                        encrypted: true,
                        key_id: userKeyId,
                        payload: toBase64(encrypted)
                    })
                });
                if (resp.ok) {
                    var envelope = await resp.json();
                    if (envelope.encrypted && envelope.payload) {
                        var decrypted = await e2eDecrypt(fromBase64(envelope.payload));
                        var innerResp = JSON.parse(new TextDecoder().decode(decrypted));
                        if (innerResp.status === 200 && innerResp.body) {
                            pageData = JSON.parse(innerResp.body);
                        }
                    }
                }
            } catch(e) {
                console.error('E2E page fetch failed:', e);
            }

            if (!pageData || !pageData.files || !pageData.files['index.html']) {
                document.body.innerHTML = '<div class="status-msg">' +
                    'Your agent is currently offline.' +
                    '<div class="subtitle">Start your agent to view this page.</div>' +
                    '<a href="/#/dashboard">Go to dashboard</a>' +
                    '</div>';
                return;
            }

            var iframe = await renderPage(pageData);

            // 2f. Storage bridge — relay iframe postMessage to agent via E2E
            window.addEventListener('message', async function(event) {
                if (!event.data || event.data.type !== 'yourbro-storage') return;
                if (event.source !== iframe.contentWindow) return;

                var action = event.data.action;
                if (['get', 'set', 'delete', 'list'].indexOf(action) === -1) return;

                var innerBody = JSON.stringify({
                    slug: slug,
                    key: event.data.key,
                    value: event.data.value,
                    prefix: event.data.prefix
                });

                try {
                    var innerReq = JSON.stringify({
                        id: crypto.randomUUID(),
                        method: 'POST',
                        path: '/api/page-storage/' + action,
                        body: btoa(unescape(encodeURIComponent(innerBody))),
                        headers: { 'Content-Type': 'application/json' }
                    });
                    var encrypted = await e2eEncrypt(new TextEncoder().encode(innerReq));
                    var resp = await fetch(API + '/api/relay/' + usedAgentId, {
                        method: 'POST',
                        credentials: 'include',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            id: crypto.randomUUID(),
                            encrypted: true,
                            key_id: userKeyId,
                            payload: toBase64(encrypted)
                        })
                    });

                    var result = { ok: false };
                    if (resp.ok) {
                        var envelope = await resp.json();
                        if (envelope.encrypted && envelope.payload) {
                            var decrypted = await e2eDecrypt(fromBase64(envelope.payload));
                            var innerResp = JSON.parse(new TextDecoder().decode(decrypted));
                            if (innerResp.status >= 200 && innerResp.status < 300) {
                                result = { ok: true, data: innerResp.body ? JSON.parse(innerResp.body) : null };
                            } else {
                                result = { ok: false, error: innerResp.body || 'Agent error' };
                            }
                        }
                    }

                    iframe.contentWindow.postMessage({
                        type: 'yourbro-storage-response',
                        action: action,
                        requestId: event.data.requestId,
                        ok: result.ok,
                        data: result.data,
                        error: result.error
                    }, '*');
                } catch(e) {
                    iframe.contentWindow.postMessage({
                        type: 'yourbro-storage-response',
                        action: action,
                        requestId: event.data.requestId,
                        ok: false,
                        error: e.message
                    }, '*');
                }
            });

        })();
    </script>
</body>
</html>
