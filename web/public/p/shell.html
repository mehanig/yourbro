<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yourbro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #fafafa; }
        .frame-container { width: 100%; height: 100vh; }
        iframe { width: 100%; height: 100%; border: none; }
        .status-msg {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; font-size: 18px; color: #888;
            text-align: center; padding: 20px;
        }
        .status-msg a { color: #3b82f6; margin-top: 8px; }
        .status-msg .subtitle { font-size: 14px; color: #555; margin-top: 6px; }
    </style>
</head>
<body>
    <script>
        (async function() {
            var API = 'https://api.yourbro.ai';

            // Parse username and slug from /p/{username}/{slug}
            var parts = window.location.pathname.split('/').filter(Boolean);
            if (parts.length < 3 || parts[0] !== 'p') {
                document.body.innerHTML = '<div class="status-msg">Invalid page URL.</div>';
                return;
            }
            var username = decodeURIComponent(parts[1]);
            var slug = decodeURIComponent(parts[2]);

            document.title = slug + ' \u2014 yourbro';

            // Register Service Worker for asset serving
            var swReady = null;
            if ('serviceWorker' in navigator) {
                try {
                    await navigator.serviceWorker.register('/p/page-sw.js', { scope: '/p/' });
                    swReady = navigator.serviceWorker.ready;
                } catch(e) {
                    console.warn('SW registration failed:', e);
                }
            }

            // 1. Verify auth — get content token for iframe SDK relay auth
            var tokenResp = await fetch(API + '/api/content-token', { credentials: 'include' });
            if (!tokenResp.ok) {
                document.body.innerHTML = '<div class="status-msg">Sign in to view this page. <a href="/">Go to login</a></div>';
                return;
            }
            var token = (await tokenResp.json()).token;

            // 2. Get agent IDs from API
            var agentsResp = await fetch(API + '/api/page-agents/' + encodeURIComponent(username), { credentials: 'include' });
            if (!agentsResp.ok) {
                document.body.innerHTML = '<div class="status-msg">User not found. <a href="/">Go home</a></div>';
                return;
            }
            var agentIds = (await agentsResp.json()).agent_ids;
            if (!agentIds || agentIds.length === 0) {
                document.body.innerHTML = '<div class="status-msg">No agents registered. <a href="/">Go home</a></div>';
                return;
            }

            // 3. Load keypairs from IndexedDB (stored by dashboard pairing flow)
            var kp = null;
            var x25519kp = null;
            var agentX25519Keys = {};
            try {
                var db = await new Promise(function(res, rej) {
                    var req = indexedDB.open('clawd-keys', 2);
                    req.onupgradeneeded = function() {
                        var d = req.result;
                        if (!d.objectStoreNames.contains('keypair')) d.createObjectStore('keypair');
                        if (!d.objectStoreNames.contains('x25519')) d.createObjectStore('x25519');
                        if (!d.objectStoreNames.contains('agent-keys')) d.createObjectStore('agent-keys');
                    };
                    req.onsuccess = function() { res(req.result); };
                    req.onerror = function() { rej(req.error); };
                });
                kp = await new Promise(function(res, rej) {
                    var tx = db.transaction('keypair', 'readonly');
                    var req = tx.objectStore('keypair').get('default');
                    req.onsuccess = function() { res(req.result || null); };
                    req.onerror = function() { rej(req.error); };
                });
                x25519kp = await new Promise(function(res, rej) {
                    var tx = db.transaction('x25519', 'readonly');
                    var req = tx.objectStore('x25519').get('default');
                    req.onsuccess = function() { res(req.result || null); };
                    req.onerror = function() { rej(req.error); };
                });
                // Load agent X25519 keys for E2E
                for (var i = 0; i < agentIds.length; i++) {
                    try {
                        var k = await new Promise(function(res, rej) {
                            var tx = db.transaction('agent-keys', 'readonly');
                            var req = tx.objectStore('agent-keys').get('x25519-' + agentIds[i]);
                            req.onsuccess = function() { res(req.result || null); };
                            req.onerror = function() { rej(req.error); };
                        });
                        if (k) agentX25519Keys[agentIds[i]] = k;
                    } catch(e) {}
                }
            } catch(e) { /* IndexedDB not available */ }

            if (!kp) {
                document.body.innerHTML = '<div class="status-msg">No keypair found. <a href="/#/dashboard">Pair your agent first</a></div>';
                return;
            }

            // 4. Load SDK script from R2
            var sdkResp = await fetch('/sdk/clawd-storage.js');
            var sdkScript = sdkResp.ok ? await sdkResp.text() : '';

            // 5. Fetch page bundle from agent via relay (try each agent)
            var pageData = null;
            var usedAgentId = null;
            for (var i = 0; i < agentIds.length; i++) {
                try {
                    var resp = await fetch(API + '/api/relay/' + agentIds[i], {
                        method: 'POST',
                        credentials: 'include',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            id: crypto.randomUUID(),
                            method: 'GET',
                            path: '/api/page/' + encodeURIComponent(slug)
                        })
                    });
                    if (resp.ok) {
                        var envelope = await resp.json();
                        if (envelope.status === 200 && envelope.body) {
                            pageData = JSON.parse(envelope.body);
                            usedAgentId = agentIds[i];
                            break;
                        }
                    }
                } catch(e) {}
            }

            if (!pageData || !pageData.files || !pageData.files['index.html']) {
                document.body.innerHTML = '<div class="status-msg">' +
                    'Your agent is currently offline.' +
                    '<div class="subtitle">Start your agent to view this page.</div>' +
                    '<a href="/#/dashboard">Go to dashboard</a>' +
                    '</div>';
                return;
            }

            var pageTitle = pageData.title || slug;
            document.title = pageTitle + ' \u2014 yourbro';

            // 6. Send file bundle to Service Worker for caching
            if (swReady) {
                try {
                    var reg = await swReady;
                    var sw = reg.active;
                    if (sw) {
                        await new Promise(function(resolve) {
                            var channel = new MessageChannel();
                            channel.port1.onmessage = function() { resolve(); };
                            sw.postMessage({
                                type: 'cache-page',
                                slug: slug,
                                files: pageData.files
                            }, [channel.port2]);
                        });
                    }
                } catch(e) {
                    console.warn('SW caching failed:', e);
                }
            }

            // 7. Build enriched HTML with SDK + meta tags + base href
            var pageHTML = pageData.files['index.html'];
            var metaTags =
                '<base href="/p/assets/' + slug + '/">\n' +
                '<meta name="clawd-relay-mode" content="true">\n' +
                '<meta name="clawd-agent-id" content="' + usedAgentId + '">\n' +
                '<meta name="clawd-page-slug" content="' + slug + '">\n' +
                '<meta name="clawd-api-base" content="' + API + '">\n' +
                '<meta name="clawd-session-token" content="' + token + '">\n' +
                '<script>' + sdkScript + '<\/script>\n';
            var enrichedHTML = metaTags + pageHTML;

            // 8. Create sandboxed iframe with srcdoc
            var container = document.createElement('div');
            container.className = 'frame-container';
            var iframe = document.createElement('iframe');
            iframe.srcdoc = enrichedHTML;
            iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin');
            container.appendChild(iframe);
            document.body.appendChild(container);

            // 9. Send keypairs to sandboxed iframe via postMessage
            iframe.addEventListener('load', function() {
                var msg = {
                    type: 'clawd-keypair',
                    privateKey: kp.privateKey,
                    publicKeyBytes: kp.publicKeyBytes
                };
                if (x25519kp) {
                    msg.x25519PrivateKey = x25519kp.privateKey;
                    msg.x25519PublicKeyBytes = x25519kp.publicKeyBytes;
                }
                if (agentX25519Keys[usedAgentId]) {
                    msg.agentX25519PublicKeyBytes = agentX25519Keys[usedAgentId];
                }
                iframe.contentWindow.postMessage(msg, '*');
            });
        })();
    </script>
</body>
</html>
