<!DOCTYPE html>
<html><head><meta charset="UTF-8"></head>
<body>
<script>
(function() {
    var API = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
        ? '' : 'https://api.yourbro.ai';

    fetch(API + '/api/identity-token', { credentials: 'include' })
        .then(function(r) { return r.ok ? r.json() : null; })
        .then(function(data) {
            parent.postMessage({
                type: 'yourbro-identity',
                token: data && data.token ? data.token : null
            }, '*');
        })
        .catch(function() {
            parent.postMessage({ type: 'yourbro-identity', token: null }, '*');
        });
})();
</script>
</body>
</html>
