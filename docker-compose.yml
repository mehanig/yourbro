services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: yourbro
      POSTGRES_PASSWORD: yourbro
      POSTGRES_DB: yourbro
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yourbro"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
