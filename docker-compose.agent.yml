services:
  agent-server:
    build:
      context: .
      dockerfile: Dockerfile.agent
    ports:
      - "${AGENT_PORT:-9443}:${AGENT_PORT:-9443}"
    volumes:
      - agent-data:/data
    environment:
      AGENT_DOMAIN: ${AGENT_DOMAIN:-}
      AGENT_PORT: ${AGENT_PORT:-9443}
      SQLITE_PATH: /data/agent.db
    restart: unless-stopped

volumes:
  agent-data:
