services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/ssl/yourbro:ro
    depends_on:
      - api
    restart: unless-stopped

  api:
    image: mehanig.azurecr.io/yourbro:latest
    expose:
      - "8080"
    env_file: .env
    environment:
      API_URL: https://api.yourbro.ai
      API_HOST: api.yourbro.ai
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: yourbro
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: yourbro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yourbro"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
