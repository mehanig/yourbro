# Docker Compose for running yourbro-agent as a container
# Usage: docker compose up -d
services:
  yourbro-agent:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - agent-data:/data
    environment:
      SQLITE_PATH: /data/agent.db
      YOURBRO_TOKEN: ${YOURBRO_TOKEN:-}
      YOURBRO_SERVER_URL: ${YOURBRO_SERVER_URL:-}
      YOURBRO_AGENT_NAME: ${YOURBRO_AGENT_NAME:-relay-agent}
    restart: unless-stopped

volumes:
  agent-data:
