<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yourbro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #fafafa; }
        .frame-container { width: 100%; height: 100vh; }
        iframe { width: 100%; height: 100%; border: none; }
        .status-msg {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; font-size: 18px; color: #888;
            text-align: center; padding: 20px;
        }
        .status-msg a { color: #3b82f6; margin-top: 8px; }
        .status-msg .subtitle { font-size: 14px; color: #555; margin-top: 6px; }
        .code-prompt {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; padding: 20px;
        }
        .code-prompt p { color: #888; font-size: 16px; margin-bottom: 16px; }
        .code-prompt input {
            background: #1a1a1a; border: 1px solid #333; color: #fafafa;
            font-family: monospace; font-size: 24px; letter-spacing: 0.2em;
            text-transform: uppercase; padding: 12px 16px; text-align: center;
            width: 220px; border-radius: 6px; outline: none;
        }
        .code-prompt input:focus { border-color: #3b82f6; }
        .code-prompt button {
            margin-top: 12px; background: #3b82f6; color: #fff; border: none;
            padding: 10px 32px; border-radius: 6px; font-size: 15px; cursor: pointer;
        }
        .code-prompt button:hover { background: #2563eb; }
        .code-prompt .error { color: #ef4444; font-size: 13px; margin-top: 8px; }
    </style>
</head>
<body>
    <script>
        (async function() {
            var API = '/*YOURBRO_API_URL*/';
            var CUSTOM_DOMAIN_USER = '/*YOURBRO_CUSTOM_USER*/';

            // Detect API URL: if placeholders are not replaced, use default logic
            if (API.indexOf('/*') === 0) {
                API = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
                    ? '' : 'https://api.yourbro.ai';
            }

            var username, slug;
            if (CUSTOM_DOMAIN_USER && CUSTOM_DOMAIN_USER.indexOf('/*') !== 0) {
                // Custom domain: /{slug} (username implicit from domain)
                username = CUSTOM_DOMAIN_USER;
                slug = decodeURIComponent(window.location.pathname.split('/').filter(Boolean)[0] || '');
                if (!slug) {
                    document.body.innerHTML = '<div class="status-msg">No page specified.</div>';
                    return;
                }
            } else {
                // yourbro.ai: /p/{username}/{slug} (existing logic)
                var parts = window.location.pathname.split('/').filter(Boolean);
                if (parts.length < 3 || parts[0] !== 'p') {
                    document.body.innerHTML = '<div class="status-msg">Invalid page URL.</div>';
                    return;
                }

                if (parts[1] === 'assets') return;

                username = decodeURIComponent(parts[1]);
                slug = decodeURIComponent(parts[2]);
            }

            document.title = slug + ' \u2014 yourbro';

            var _debug = new URLSearchParams(window.location.search).has('debug');
            var _dbg = '';

            // MIME type lookup
            var MIMES = {
                'html':'text/html;charset=utf-8','js':'application/javascript;charset=utf-8',
                'mjs':'application/javascript;charset=utf-8','css':'text/css;charset=utf-8',
                'json':'application/json;charset=utf-8','svg':'image/svg+xml',
                'png':'image/png','jpg':'image/jpeg','jpeg':'image/jpeg','gif':'image/gif',
                'webp':'image/webp','ico':'image/x-icon','woff':'font/woff','woff2':'font/woff2',
                'ttf':'font/ttf','otf':'font/otf','mp3':'audio/mpeg','mp4':'video/mp4',
                'webm':'video/webm','pdf':'application/pdf','txt':'text/plain;charset=utf-8',
                'xml':'text/xml;charset=utf-8'
            };
            function fileMime(name) {
                var d = name.lastIndexOf('.');
                return d === -1 ? 'application/octet-stream' : (MIMES[name.substring(d+1).toLowerCase()] || 'application/octet-stream');
            }

            // Render page: convert all assets to data URIs, load via srcdoc in sandboxed iframe
            async function renderPage(pageData) {
                document.body.innerHTML = '';
                var pageTitle = pageData.title || slug;
                document.title = pageTitle + ' \u2014 yourbro';

                var files = pageData.files;
                var dataMap = {};

                // Create data URIs for all non-HTML files
                for (var name in files) {
                    if (name === 'index.html') continue;
                    var content = files[name];
                    var mime = fileMime(name);
                    if (typeof content === 'string' && content.substring(0, 7) === 'base64:') {
                        dataMap[name] = 'data:' + mime + ';base64,' + content.substring(7);
                    } else if (typeof content === 'string') {
                        dataMap[name] = 'data:' + mime + ';base64,' + btoa(unescape(encodeURIComponent(content)));
                    }
                }

                // Parse HTML and rewrite src/href/poster attributes to data URIs
                var dp = new DOMParser();
                var doc = dp.parseFromString(files['index.html'], 'text/html');

                function resolveAttr(el, attr) {
                    var val = el.getAttribute(attr);
                    if (!val) return;
                    var clean = val.replace(/^\.\//, '');
                    if (dataMap[clean]) el.setAttribute(attr, dataMap[clean]);
                }
                doc.querySelectorAll('[src]').forEach(function(el) { resolveAttr(el, 'src'); });
                doc.querySelectorAll('[href]').forEach(function(el) { resolveAttr(el, 'href'); });
                doc.querySelectorAll('[poster]').forEach(function(el) { resolveAttr(el, 'poster'); });

                // Inject fetch/XHR override so JS-initiated requests resolve from data URIs
                var overrideEl = doc.createElement('script');
                overrideEl.textContent = '(function(){' +
                    'var m=' + JSON.stringify(dataMap) + ';' +
                    'function r(u){return u.replace(/^\\.\\//,"");}' +
                    'var F=window.fetch;window.fetch=function(u,o){' +
                    'var k=r(typeof u==="string"?u:u.url);' +
                    'if(m[k])return F(m[k],o);return F.apply(this,arguments)};' +
                    'var X=XMLHttpRequest.prototype.open;' +
                    'XMLHttpRequest.prototype.open=function(){' +
                    'var u=arguments[1];if(typeof u==="string"){var k=r(u);if(m[k])arguments[1]=m[k]}' +
                    'return X.apply(this,arguments)};' +
                    '["src","href"].forEach(function(a){' +
                    '["HTMLImageElement","HTMLScriptElement","HTMLLinkElement","HTMLSourceElement","HTMLMediaElement"].forEach(function(t){' +
                    'var P=window[t]&&window[t].prototype;if(!P)return;' +
                    'var d=Object.getOwnPropertyDescriptor(P,a);if(!d||!d.set)return;' +
                    'Object.defineProperty(P,a,{set:function(v){' +
                    'var k=r(typeof v==="string"?v:v);if(m[k])return d.set.call(this,m[k]);' +
                    'return d.set.call(this,v)},get:d.get,configurable:true})})})' +
                    '})()';
                var head = doc.head || doc.documentElement;
                head.insertBefore(overrideEl, head.firstChild);

                var html = '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;

                _dbg += 'files=' + Object.keys(files).length + '\n';
                _dbg += 'data-uris=' + Object.keys(dataMap).join(',') + '\n';

                var container = document.createElement('div');
                container.className = 'frame-container';
                var iframe = document.createElement('iframe');
                iframe.srcdoc = html;
                iframe.setAttribute('sandbox', 'allow-scripts allow-popups allow-popups-to-escape-sandbox');

                if (_debug) {
                    _dbg += 'html=' + html.length + 'b\n';
                    _dbg += html.substring(0, 200) + '\n';
                    var dbgEl = document.createElement('pre');
                    dbgEl.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#000;color:#0f0;font-size:11px;padding:8px;max-height:40vh;overflow:auto;white-space:pre-wrap;word-break:break-all';
                    dbgEl.textContent = _dbg;
                    document.body.appendChild(dbgEl);
                }

                container.appendChild(iframe);
                document.body.appendChild(container);

                return iframe;
            }

            // ==========================================
            // Unified E2E encrypted flow for all pages
            // ==========================================

            // 1. Generate or load X25519 key pair from IndexedDB
            var x25519Private = null; // CryptoKey
            var x25519PubBytes = null; // Uint8Array
            try {
                var idb = await new Promise(function(res, rej) {
                    var req = indexedDB.open('clawd-keys', 4);
                    req.onupgradeneeded = function(event) {
                        var d = req.result;
                        if (event.oldVersion < 3) {
                            for (var n of Array.from(d.objectStoreNames)) d.deleteObjectStore(n);
                            d.createObjectStore('x25519');
                            d.createObjectStore('agent-keys');
                        }
                        if (!d.objectStoreNames.contains('access-codes')) {
                            d.createObjectStore('access-codes');
                        }
                    };
                    req.onsuccess = function() { res(req.result); };
                    req.onerror = function() { rej(req.error); };
                });
                var stored = await new Promise(function(res, rej) {
                    var tx = idb.transaction('x25519', 'readonly');
                    var req = tx.objectStore('x25519').get('default');
                    req.onsuccess = function() { res(req.result || null); };
                    req.onerror = function() { rej(req.error); };
                });
                if (stored && stored.pk && stored.pub) {
                    x25519Private = await crypto.subtle.importKey('pkcs8', stored.pk.buffer || stored.pk, 'X25519', false, ['deriveBits']);
                    x25519PubBytes = new Uint8Array(stored.pub);
                } else {
                    // Generate new X25519 key pair for anonymous viewer
                    var kp = await crypto.subtle.generateKey('X25519', true, ['deriveBits']);
                    var privExport = await crypto.subtle.exportKey('pkcs8', kp.privateKey);
                    var pubExport = await crypto.subtle.exportKey('raw', kp.publicKey);
                    x25519Private = kp.privateKey;
                    x25519PubBytes = new Uint8Array(pubExport);
                    // Store in IndexedDB for reuse
                    await new Promise(function(res, rej) {
                        var tx = idb.transaction('x25519', 'readwrite');
                        tx.objectStore('x25519').put({ pk: new Uint8Array(privExport), pub: x25519PubBytes }, 'default');
                        tx.oncomplete = function() { res(); };
                        tx.onerror = function() { rej(tx.error); };
                    });
                }
            } catch(e) {
                console.error('Key generation failed:', e);
                document.body.innerHTML = '<div class="status-msg">Failed to initialize encryption keys.<div class="subtitle">' + e.message + '</div></div>';
                return;
            }

            // User's X25519 public key as base64url (key_id for the relay)
            var userKeyId = '';
            if (x25519PubBytes) {
                var s = '';
                for (var i = 0; i < x25519PubBytes.length; i++) s += String.fromCharCode(x25519PubBytes[i]);
                userKeyId = btoa(s).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
            }

            // 2. GET discovery — returns { agent_uuid, x25519_public }
            var agentUUID = null;
            var agentPubBytes = null;
            try {
                var discoveryUrl = API + '/api/public-page/' +
                    encodeURIComponent(username) + '/' + encodeURIComponent(slug);
                _dbg += 'discovery: ' + discoveryUrl + '\n';
                var discoveryResp = await fetch(discoveryUrl);
                _dbg += 'discovery status: ' + discoveryResp.status + '\n';
                if (discoveryResp.ok) {
                    var discovery = await discoveryResp.json();
                    agentUUID = discovery.agent_uuid;
                    // Decode base64 agent pubkey
                    var b64 = discovery.x25519_public;
                    var raw = atob(b64);
                    agentPubBytes = new Uint8Array(raw.length);
                    for (var i = 0; i < raw.length; i++) agentPubBytes[i] = raw.charCodeAt(i);
                }
            } catch(e) {
                _dbg += 'discovery error: ' + e.message + '\n';
            }

            if (!agentUUID || !agentPubBytes) {
                document.body.innerHTML = '<div class="status-msg">' +
                    'This page is not available.' +
                    '<div class="subtitle">The author\'s agent may be offline or the page doesn\'t exist.</div>' +
                    (_debug ? '<pre style="font-size:11px;color:#555;margin-top:12px;text-align:left;max-width:400px;word-break:break-all">' + _dbg + '</pre>' : '') +
                    '</div>';
                return;
            }

            // 3. Derive AES key: ECDH(viewer_priv, agent_pub) + HKDF
            var aesKey = null;
            try {
                var agentPub = await crypto.subtle.importKey('raw', agentPubBytes, 'X25519', true, []);
                var shared = await crypto.subtle.deriveBits(
                    { name: 'X25519', public: agentPub }, x25519Private, 256
                );
                var hkdfKey = await crypto.subtle.importKey('raw', shared, 'HKDF', false, ['deriveKey']);
                aesKey = await crypto.subtle.deriveKey(
                    { name: 'HKDF', hash: 'SHA-256', salt: new ArrayBuffer(0), info: new TextEncoder().encode('yourbro-e2e-v1') },
                    hkdfKey,
                    { name: 'AES-GCM', length: 256 },
                    false,
                    ['encrypt', 'decrypt']
                );
            } catch(e) {
                console.error('Key derivation failed:', e);
                document.body.innerHTML = '<div class="status-msg">Encryption setup failed.<div class="subtitle">' + e.message + '</div></div>';
                return;
            }

            // E2E helpers
            function e2eEncrypt(plaintext) {
                var iv = crypto.getRandomValues(new Uint8Array(12));
                return crypto.subtle.encrypt({ name: 'AES-GCM', iv: iv }, aesKey, plaintext).then(function(ct) {
                    var result = new Uint8Array(12 + ct.byteLength);
                    result.set(iv);
                    result.set(new Uint8Array(ct), 12);
                    return result;
                });
            }
            function e2eDecrypt(data) {
                var iv = data.slice(0, 12);
                var ct = data.slice(12);
                return crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, aesKey, ct).then(function(pt) {
                    return new Uint8Array(pt);
                });
            }
            function toBase64(bytes) {
                var s = '';
                for (var i = 0; i < bytes.length; i++) s += String.fromCharCode(bytes[i]);
                return btoa(s);
            }
            function fromBase64(b64) {
                var s = atob(b64);
                var bytes = new Uint8Array(s.length);
                for (var i = 0; i < s.length; i++) bytes[i] = s.charCodeAt(i);
                return bytes;
            }

            // Encrypted relay helper — sends an encrypted inner request to the agent
            async function encryptedRelay(innerReq) {
                var encrypted = await e2eEncrypt(new TextEncoder().encode(JSON.stringify(innerReq)));
                var resp = await fetch(API + '/api/public-page/' + agentUUID + '/' + encodeURIComponent(slug), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Referrer': document.referrer || '' },
                    body: JSON.stringify({
                        id: crypto.randomUUID(),
                        encrypted: true,
                        key_id: userKeyId,
                        payload: toBase64(encrypted)
                    })
                });
                if (!resp.ok) return null;
                var envelope = await resp.json();
                if (!envelope.encrypted || !envelope.payload) return null;
                var decrypted = await e2eDecrypt(fromBase64(envelope.payload));
                return JSON.parse(new TextDecoder().decode(decrypted));
            }

            // 4. Fetch identity token (best-effort — fails silently for anonymous viewers)
            var identityToken = null;
            try {
                var idResp = await fetch((API || '') + '/api/identity-token', { credentials: 'include' });
                if (idResp.ok) {
                    var idData = await idResp.json();
                    identityToken = idData.token;
                }
            } catch(e) {
                _dbg += 'identity-token fetch skipped: ' + e.message + '\n';
            }

            // Access code helpers — stored in IndexedDB per page (username/slug)
            var acStoreKey = username + '/' + slug;
            async function loadAccessCode() {
                try {
                    var tx = idb.transaction('access-codes', 'readonly');
                    var req = tx.objectStore('access-codes').get(acStoreKey);
                    return await new Promise(function(res) {
                        req.onsuccess = function() { res(req.result || null); };
                        req.onerror = function() { res(null); };
                    });
                } catch(e) { return null; }
            }
            async function saveAccessCode(code) {
                try {
                    var tx = idb.transaction('access-codes', 'readwrite');
                    tx.objectStore('access-codes').put(code, acStoreKey);
                } catch(e) {}
            }

            function promptAccessCode(errorMsg) {
                return new Promise(function(resolve) {
                    document.body.innerHTML = '';
                    var div = document.createElement('div');
                    div.className = 'code-prompt';
                    div.innerHTML = '<p>This page requires an access code.</p>' +
                        '<input type="text" maxlength="8" placeholder="Enter code" autofocus>' +
                        '<button>Submit</button>' +
                        (errorMsg ? '<div class="error">' + errorMsg + '</div>' : '');
                    document.body.appendChild(div);
                    var input = div.querySelector('input');
                    var btn = div.querySelector('button');
                    function submit() {
                        var val = input.value.trim().toUpperCase();
                        if (val) resolve(val);
                    }
                    btn.addEventListener('click', submit);
                    input.addEventListener('keydown', function(e) { if (e.key === 'Enter') submit(); });
                    input.focus();
                });
            }

            // Build headers for inner relay request
            function buildInnerHeaders() {
                var h = {};
                if (identityToken) h['X-Identity-Token'] = identityToken;
                if (currentAccessCode) h['X-Access-Code'] = currentAccessCode;
                return Object.keys(h).length > 0 ? h : undefined;
            }

            // Helper to parse error from agent response
            function getAgentError(innerResp) {
                if (!innerResp || !innerResp.body) return null;
                try { return JSON.parse(innerResp.body).error || null; } catch(e) { return null; }
            }

            function showStatusMsg(title, subtitle) {
                document.body.innerHTML = '<div class="status-msg">' + title +
                    '<div class="subtitle">' + subtitle + '</div>' +
                    (_debug ? '<pre style="font-size:11px;color:#555;margin-top:12px;text-align:left;max-width:400px;word-break:break-all">' + _dbg + '</pre>' : '') +
                    '</div>';
            }

            // 5. Fetch page bundle via E2E encrypted relay
            var currentAccessCode = await loadAccessCode();
            var pageData = null;
            var lastError = null;
            var fetchAttempts = 0;
            var maxAttempts = 3;

            while (!pageData && fetchAttempts < maxAttempts) {
                fetchAttempts++;
                try {
                    var innerResp = await encryptedRelay({
                        id: crypto.randomUUID(),
                        method: 'GET',
                        path: '/api/page/' + encodeURIComponent(slug),
                        headers: buildInnerHeaders()
                    });
                    if (innerResp && innerResp.status === 200 && innerResp.body) {
                        pageData = JSON.parse(innerResp.body);
                        if (currentAccessCode) await saveAccessCode(currentAccessCode);
                        break;
                    }
                    lastError = getAgentError(innerResp);
                } catch(e) {
                    _dbg += 'E2E fetch error: ' + e.message + '\n';
                    console.error('E2E page fetch failed:', e);
                }

                // Handle specific error states
                if (lastError === 'login_required') {
                    var loginUrl = (API || '') + '/auth/google';
                    showStatusMsg(
                        'Sign in to view this page.',
                        '<a href="' + loginUrl + '" style="color:#3b82f6">Sign in with Google</a> to continue.'
                    );
                    return;
                }

                if (lastError === 'email_not_allowed') {
                    showStatusMsg(
                        'You don\'t have access to this page.',
                        'The page owner has not granted access to your account.'
                    );
                    return;
                }

                // Access code required or invalid — prompt for code
                if (lastError === 'access_code_required' || lastError === 'invalid_access_code') {
                    var errMsg = lastError === 'invalid_access_code' ? 'Invalid code. Try again.' : null;
                    currentAccessCode = await promptAccessCode(errMsg);
                    continue;
                }

                // Any other error — stop retrying
                break;
            }

            if (!pageData || !pageData.files || !pageData.files['index.html']) {
                if (identityToken) {
                    showStatusMsg(
                        'This page is not available for your account.',
                        'The page may not exist or you may not have access.'
                    );
                } else {
                    var loginUrl = (API || '') + '/auth/google';
                    showStatusMsg(
                        'This page is not available.',
                        '<a href="' + loginUrl + '" style="color:#3b82f6">Sign in with Google</a> — logging in might help if you have access and the page exists.'
                    );
                }
                return;
            }

            // 5. Render
            var iframe = await renderPage(pageData);

            // 6. Storage bridge — relay iframe postMessage to agent via E2E
            window.addEventListener('message', async function(event) {
                if (!event.data || event.data.type !== 'yourbro-storage') return;
                if (event.source !== iframe.contentWindow) return;

                var action = event.data.action;
                if (['get', 'set', 'delete', 'list'].indexOf(action) === -1) return;

                var innerBody = JSON.stringify({
                    slug: slug,
                    key: event.data.key,
                    value: event.data.value,
                    prefix: event.data.prefix
                });

                try {
                    var storageHeaders = { 'Content-Type': 'application/json' };
                    if (identityToken) storageHeaders['X-Identity-Token'] = identityToken;
                    if (currentAccessCode) storageHeaders['X-Access-Code'] = currentAccessCode;

                    var innerResp = await encryptedRelay({
                        id: crypto.randomUUID(),
                        method: 'POST',
                        path: '/api/page-storage/' + action,
                        body: btoa(unescape(encodeURIComponent(innerBody))),
                        headers: storageHeaders
                    });

                    var result = { ok: false };
                    if (innerResp && innerResp.status >= 200 && innerResp.status < 300) {
                        result = { ok: true, data: innerResp.body ? JSON.parse(innerResp.body) : null };
                    } else if (innerResp) {
                        result = { ok: false, error: innerResp.body || 'Agent error' };
                    }

                    iframe.contentWindow.postMessage({
                        type: 'yourbro-storage-response',
                        action: action,
                        requestId: event.data.requestId,
                        ok: result.ok,
                        data: result.data,
                        error: result.error
                    }, '*');
                } catch(e) {
                    iframe.contentWindow.postMessage({
                        type: 'yourbro-storage-response',
                        action: action,
                        requestId: event.data.requestId,
                        ok: false,
                        error: e.message
                    }, '*');
                }
            });

        })();
    </script>
</body>
</html>
