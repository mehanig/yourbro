<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yourbro — Verifying identity</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #fafafa;
               display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px;
                padding: 2rem; text-align: center; max-width: 360px; }
        .logo { width: 48px; height: auto; margin-bottom: 1rem; }
        h1 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem; }
        p { color: #8b949e; font-size: 0.85rem; line-height: 1.5; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #30363d;
                   border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.8s linear infinite;
                   margin-bottom: 1rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .done { color: #3fb950; }
        .fail { color: #f85149; }
    </style>
</head>
<body>
    <div class="card">
        <img src="/yourbro_logo.png" alt="yourbro" class="logo" onerror="this.style.display='none'">
        <div class="spinner" id="spinner"></div>
        <h1 id="title">Verifying your identity...</h1>
        <p id="msg">This window will close automatically.</p>
    </div>
<script>
(function() {
    var opener = window.opener;
    if (!opener) {
        document.getElementById('title').textContent = 'Error';
        document.getElementById('title').className = 'fail';
        document.getElementById('msg').textContent = 'This page must be opened from a yourbro page.';
        document.getElementById('spinner').style.display = 'none';
        return;
    }

    var parentOrigin = null;
    try { parentOrigin = document.referrer ? new URL(document.referrer).origin : null; } catch(e) {}
    if (!parentOrigin) {
        // Fallback: try opener origin via the URL param
        try {
            var params = new URLSearchParams(window.location.search);
            parentOrigin = params.get('origin');
        } catch(e) {}
    }
    if (!parentOrigin) {
        document.getElementById('title').textContent = 'Error';
        document.getElementById('title').className = 'fail';
        document.getElementById('msg').textContent = 'Could not determine the requesting page.';
        document.getElementById('spinner').style.display = 'none';
        return;
    }

    fetch('/api/identity-token', { credentials: 'include' })
        .then(function(r) { return r.ok ? r.json() : null; })
        .then(function(data) {
            var token = data && data.token ? data.token : null;
            opener.postMessage({ type: 'yourbro-identity', token: token }, parentOrigin);
            document.getElementById('spinner').style.display = 'none';
            if (token) {
                document.getElementById('title').textContent = 'Identity verified';
                document.getElementById('title').className = 'done';
                document.getElementById('msg').textContent = 'Closing...';
                setTimeout(function() { window.close(); }, 600);
            } else {
                document.getElementById('title').textContent = 'Not signed in';
                document.getElementById('title').className = 'fail';
                document.getElementById('msg').textContent = 'Sign in to yourbro.ai first, then try again.';
            }
        })
        .catch(function() {
            opener.postMessage({ type: 'yourbro-identity', token: null }, parentOrigin);
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('title').textContent = 'Verification failed';
            document.getElementById('title').className = 'fail';
            document.getElementById('msg').textContent = 'Something went wrong. Try again.';
        });
})();
</script>
</body>
</html>
