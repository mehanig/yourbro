worker_processes auto;
events {
    worker_connections 1024;
}

# SNI-based routing on port 443:
# - Known domains (yourbro.ai) → nginx TLS termination on 8444
# - Unknown domains (custom) → Go autocert on api:8443
stream {
    map $ssl_preread_server_name $backend {
        yourbro.ai   api_tls;
        default      custom_tls;
    }
    upstream api_tls { server 127.0.0.1:8444; }
    upstream custom_tls { server api:8443; }
    server {
        listen 443;
        ssl_preread on;
        proxy_pass $backend;
    }
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # HTTP: redirect + ACME challenges
    server {
        listen 80;
        server_name yourbro.ai;

        # Let's Encrypt challenge (nginx-managed certs)
        location /.well-known/acme-challenge/ {
            root /var/lib/letsencrypt;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTP catch-all: ACME challenges for custom domains → Go autocert
    server {
        listen 80 default_server;

        location /.well-known/acme-challenge/ {
            proxy_pass http://api:8080;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Main HTTPS server — listens on 8444 (internal, receives proxied traffic from stream)
    server {
        listen 8444 ssl;
        http2 on;
        server_name yourbro.ai;

        ssl_certificate     /etc/letsencrypt/live/yourbro.ai/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yourbro.ai/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # WebSocket — agent relay connection
        location /ws/ {
            proxy_pass http://api:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # SSE — disable buffering so events stream immediately
        location /api/agents/stream {
            proxy_pass http://api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            chunked_transfer_encoding off;
        }

        # Proxy to API (serves both API and embedded frontend)
        location / {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
