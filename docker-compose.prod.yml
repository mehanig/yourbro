services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt
    depends_on:
      api:
        condition: service_started
    networks:
      - yourbro
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      API_URL: https://api.yourbro.ai
      API_HOST: api.yourbro.ai
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - yourbro
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: yourbro
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yourbro}
      POSTGRES_DB: yourbro
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yourbro"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - yourbro
    restart: unless-stopped

networks:
  yourbro:
    driver: bridge

volumes:
  pgdata:
  certbot-etc:
  certbot-var:
